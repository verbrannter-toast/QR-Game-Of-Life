<!DOCTYPE html>
<!--
  This file is the "readable" reference copy. 
  Although it also works as a standalone HTML file, the actual QR-Code encodes a minified, percent-encoded single-line data:text/html URI (see the minified version).
  This file exists purely for documentation.

  Grid: 40x40 cells, rendered on a tiny <canvas> and stretched via CSS to fill the screen. image-rendering:pixelated keeps the cells crisp instead of blurry when scaled up.
-->
<html>
<head>
<meta charset="utf-8">
<style>
  html, body {
    margin: 0;
    /* prevents scrollbars/bounce so the canvas ideally fills the entire viewport */
    overflow: hidden;
  }

  #board {
    background: #000;
    width: 100vw;
    height: 88vh; /* the bottom 12vh reserved for the control bar */
    image-rendering: pixelated; /* nearest-neighbor scaling: keeps 40x40 cells sharp instead of blurry when stretched to fill the screen */
  }

  #controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    height: 12vh;
  }

  #controls button {
    flex: 1;
    font-size: 6vh;
    border: 0;
  }
</style>
</head>
<body>

  <canvas id="board"></canvas>

  <div id="controls">
    <button onclick="slowDown()">-</button>
    <button onclick="speedUp()">+</button>
    <button id="pauseBtn" onclick="togglePause()">||</button>
  </div>

<script>
  // configuration constants
  const GRID_SIZE = 40;         // both width and height of the grid, in cells
  const MIN_DELAY_MS = 20;      // fastest allowed tick speed
  const MAX_DELAY_MS = 1000;    // slowest allowed tick speed
  const SPEED_STEP_MS = 50;     // how much each +/- press changes the delay

  let tickDelay = 100;          // current delay (ms) between simulation steps
  let isRunning = true;         // whether the simulation is currently advancing (paused or not)

  // canvas setup
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  canvas.width = GRID_SIZE;
  canvas.height = GRID_SIZE;

  // initial random grid state
  // 2D array, grid[x][y] === 1 means "alive". ~30% of cells start alive.
  let grid = Array(GRID_SIZE)
    .fill(0)
    .map(() =>
      Array(GRID_SIZE)
        .fill(0)
        .map(() => (Math.random() > 0.7 ? 1 : 0))
    );

  // click/tap to toggle a cell
  canvas.onclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    // convert click position (in CSS pixels) to grid coordinates (0..39), since the canvas's internal resolution is much smaller than its on-screen CSS size.
    const x = Math.floor(((e.clientX - rect.left) / rect.width) * GRID_SIZE);
    const y = Math.floor(((e.clientY - rect.top) / rect.height) * GRID_SIZE);
    grid[x][y] ^= 1; // flip 0 -> 1 or 1 -> 0
  };

  // speed/pause controls
  function speedUp() {
    tickDelay = Math.max(tickDelay - SPEED_STEP_MS, MIN_DELAY_MS);
  }

  function slowDown() {
    tickDelay = Math.min(tickDelay + SPEED_STEP_MS, MAX_DELAY_MS);
  }

  function togglePause() {
    isRunning = !isRunning;
    document.getElementById("pauseBtn").textContent = isRunning ? "||" : ">";
  }

  // keyboard support (desktop only)
  document.onkeydown = (e) => {
    if (e.key === "ArrowUp") speedUp();
    else if (e.key === "ArrowDown") slowDown();
    else if (e.key === " ") {
      togglePause();
      e.preventDefault(); // stop spacebar from scrolling the page
    }
  };

  // simulation step
  function countLiveNeighbors(x, y) {
    let count = 0;
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        if (dx === 0 && dy === 0) continue; // skip the cell itself
        // wrap around edges (toroidal grid) using modulo
        const nx = (x + dx + GRID_SIZE) % GRID_SIZE;
        const ny = (y + dy + GRID_SIZE) % GRID_SIZE;
        count += grid[nx][ny];
      }
    }
    return count;
  }

  function step() {
    const nextGrid = grid.map((row) => [...row]);

    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) {
        const neighbors = countLiveNeighbors(x, y);
        const alive = grid[x][y] === 1;

        // standard Conway's Game of Life rules:
        // - live cell with 2 or 3 live neighbors survives
        // - dead cell with exactly 3 live neighbors becomes alive
        // - all other cells die or stay dead
        nextGrid[x][y] = neighbors === 3 || (alive && neighbors === 2) ? 1 : 0;
      }
    }

    grid = nextGrid;
  }

  // render and main loop
  function render() {
    ctx.clearRect(0, 0, GRID_SIZE, GRID_SIZE);
    ctx.fillStyle = "#0f0";
    for (let x = 0; x < GRID_SIZE; x++) {
      for (let y = 0; y < GRID_SIZE; y++) {
        if (grid[x][y]) ctx.fillRect(x, y, 1, 1);
      }
    }
  }

  function loop() {
    if (isRunning) {
      step();
    }
    render();
    setTimeout(loop, tickDelay);
  }

  loop();
</script>

</body>
</html>
